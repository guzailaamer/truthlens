<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthLens — Fact Check</title>
  <meta name="description" content="AI-powered fake news detector for WhatsApp forwards, viral news, and Instagram screenshots. Powered by Google Gemini." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            verdict: {
              real: '#15803d',
              fake: '#b91c1c',
              unverified: '#b45309',
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Accessible focus ring — visible for keyboard users */
    :focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    /* Fade-in animation for result card */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.4s ease both; }
    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans flex flex-col items-center px-4 py-10">

  <!-- ========== HEADER ========== -->
  <header class="text-center mb-10 max-w-xl w-full">
    <div class="flex items-center justify-center gap-2 mb-2">
      <span class="text-3xl" aria-hidden="true">🔍</span>
      <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">
        TruthLens
      </h1>
    </div>
    <p class="text-lg font-semibold text-gray-200">Fact-check anything in seconds</p>
    <p class="text-sm text-gray-400 mt-1">For WhatsApp forwards, viral news, Instagram screenshots</p>
  </header>

  <!-- ========== INPUT CARD ========== -->
  <main class="w-full max-w-xl">
    <section
      class="bg-gray-900 border border-gray-700 rounded-2xl p-6 shadow-xl"
      aria-label="Fact check input"
    >
      <!-- Text claim -->
      <div class="mb-4">
        <label for="claim-text" class="block text-sm font-medium text-gray-300 mb-1">
          Claim or WhatsApp forward
        </label>
        <textarea
          id="claim-text"
          name="claim-text"
          rows="4"
          class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-500 focus:border-blue-500 resize-none transition"
          placeholder="Paste a claim, WhatsApp forward, or headline..."
          aria-label="Paste a claim, WhatsApp forward, or headline"
          maxlength="5000"
        ></textarea>
      </div>

      <!-- URL input -->
      <div class="mb-4">
        <label for="article-url" class="block text-sm font-medium text-gray-300 mb-1">
          News article URL
        </label>
        <input
          id="article-url"
          name="article-url"
          type="url"
          class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-500 focus:border-blue-500 transition"
          placeholder="Or paste a news article URL..."
          aria-label="Paste a news article URL"
          maxlength="2048"
        />
      </div>

      <!-- Image upload -->
      <div class="mb-6">
        <label for="image-upload" class="block text-sm font-medium text-gray-300 mb-1">
          Screenshot (WhatsApp, Instagram, tweet)
        </label>
        <label
          for="image-upload"
          class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-gray-600 rounded-xl cursor-pointer hover:border-blue-500 transition bg-gray-800 hover:bg-gray-750"
          aria-label="Upload a screenshot"
        >
          <span class="text-2xl mb-1" aria-hidden="true">📎</span>
          <span id="file-label" class="text-sm text-gray-400">
            Click to upload or drag &amp; drop a screenshot
          </span>
        </label>
        <input
          id="image-upload"
          name="image-upload"
          type="file"
          accept="image/*"
          class="sr-only"
          aria-label="Upload screenshot image"
        />
      </div>

      <!-- Analyse button -->
      <button
        id="analyse-btn"
        type="button"
        disabled
        aria-disabled="true"
        aria-busy="false"
        class="w-full flex items-center justify-center gap-2 py-3 px-6 rounded-xl font-semibold text-white bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed transition focus-visible:ring-2 focus-visible:ring-blue-400"
        onclick="handleAnalyse()"
      >
        <span id="btn-icon" aria-hidden="true">✦</span>
        <span id="btn-text">Analyse</span>
      </button>

      <!-- Error alert — aria-live assertive so screen readers announce immediately -->
      <div
        id="error-alert"
        role="alert"
        aria-live="assertive"
        class="hidden mt-4 bg-red-900/50 border border-red-700 text-red-300 text-sm rounded-xl px-4 py-3"
      ></div>
    </section>

    <!-- ========== RESULT CARD ========== -->
    <!-- aria-live polite: screen readers announce result when it appears -->
    <div
      id="result-card"
      aria-live="polite"
      aria-atomic="true"
      class="hidden mt-6"
    >
      <section
        class="bg-gray-900 border border-gray-700 rounded-2xl p-6 shadow-xl fade-in"
        aria-label="Fact check result"
      >
        <!-- Verdict pill — icon + text + colour (never colour-only) -->
        <div class="flex justify-center mb-4">
          <div
            id="verdict-pill"
            class="inline-flex items-center gap-2 px-6 py-2 rounded-full text-white text-xl font-bold"
            role="status"
            aria-label="Verdict"
          >
            <span id="verdict-icon" aria-hidden="true"></span>
            <span id="verdict-text"></span>
          </div>
        </div>

        <!-- Confidence bar -->
        <div class="mb-1">
          <div
            id="confidence-bar"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="Confidence level"
            class="w-full h-1.5 rounded-full overflow-hidden bg-gray-700"
          >
            <div id="confidence-fill" class="h-full rounded-full transition-all duration-500"></div>
          </div>
        </div>
        <p id="confidence-label" class="text-xs text-gray-400 text-center mb-4"></p>

        <!-- Summary -->
        <p
          id="summary-text"
          class="text-base text-gray-200 text-center max-w-[600px] mx-auto leading-relaxed mb-6"
        ></p>

        <!-- Why section -->
        <div id="why-section" class="space-y-3 mb-6">
          <!-- Red flags -->
          <div id="red-flags-box" class="hidden bg-red-950/60 border border-red-800 rounded-xl p-4">
            <h2 class="text-sm font-semibold text-red-400 mb-2 flex items-center gap-1">
              <span aria-hidden="true">🚩</span> Red Flags
            </h2>
            <ul id="red-flags-list" class="list-disc list-inside text-sm text-red-300 space-y-1"></ul>
          </div>
          <!-- Supporting evidence -->
          <div id="evidence-box" class="hidden bg-green-950/60 border border-green-800 rounded-xl p-4">
            <h2 class="text-sm font-semibold text-green-400 mb-2 flex items-center gap-1">
              <span aria-hidden="true">✅</span> Supporting Evidence
            </h2>
            <ul id="evidence-list" class="list-disc list-inside text-sm text-green-300 space-y-1"></ul>
          </div>
        </div>

        <!-- Sources searched (collapsible) -->
        <details class="mb-4">
          <summary class="cursor-pointer text-sm font-medium text-gray-400 hover:text-gray-200 transition list-none flex items-center gap-1">
            <span aria-hidden="true">🔎</span> Sources searched
            <span class="ml-auto text-xs">(click to expand)</span>
          </summary>
          <div class="mt-3 space-y-2">
            <div id="queries-section" class="hidden flex flex-wrap gap-2" aria-label="Search queries used"></div>
            <ul id="sources-list" class="space-y-1"></ul>
          </div>
        </details>

        <!-- Disclaimer -->
        <p id="disclaimer-text" class="text-xs text-gray-500 italic text-center"></p>
      </section>
    </div>
  </main>

  <!-- ========== JAVASCRIPT ========== -->
  <script>
    'use strict';

    const textArea    = document.getElementById('claim-text');
    const urlInput    = document.getElementById('article-url');
    const fileInput   = document.getElementById('image-upload');
    const fileLabel   = document.getElementById('file-label');
    const analyseBtn  = document.getElementById('analyse-btn');
    const btnText     = document.getElementById('btn-text');
    const btnIcon     = document.getElementById('btn-icon');
    const errorAlert  = document.getElementById('error-alert');
    const resultCard  = document.getElementById('result-card');

    let imageBase64 = null;

    /** Enable/disable the Analyse button based on whether any input has a value. */
    function updateButtonState() {
      const hasInput = textArea.value.trim() || urlInput.value.trim() || imageBase64;
      analyseBtn.disabled = !hasInput;
      analyseBtn.setAttribute('aria-disabled', String(!hasInput));
    }

    textArea.addEventListener('input', updateButtonState);
    urlInput.addEventListener('input', updateButtonState);

    /** Handle file selection — read as base64 and store. */
    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        imageBase64 = e.target.result.split(',')[1];
        fileLabel.textContent = `✓ ${file.name}`;
        updateButtonState();
      };
      reader.readAsDataURL(file);
    });

    /** Show an error in the error alert region. */
    function showError(message) {
      errorAlert.textContent = message;
      errorAlert.classList.remove('hidden');
      // Move focus to alert so screen readers announce it immediately
      errorAlert.focus();
    }

    function clearError() {
      errorAlert.textContent = '';
      errorAlert.classList.add('hidden');
    }

    /** Set loading state on the button. */
    function setLoading(loading) {
      analyseBtn.setAttribute('aria-busy', String(loading));
      analyseBtn.disabled = loading;
      if (loading) {
        btnIcon.innerHTML = '<svg class="spinner w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>';
        btnText.textContent = 'Analysing with Gemini…';
      } else {
        btnIcon.textContent = '✦';
        btnText.textContent = 'Analyse';
        updateButtonState();
      }
    }

    /** Render the verdict pill with accessible icon + text + colour. */
    function renderVerdict(verdict) {
      const pill = document.getElementById('verdict-pill');
      const icon = document.getElementById('verdict-icon');
      const text = document.getElementById('verdict-text');

      const map = {
        REAL:       { bg: '#15803d', label: 'REAL',       symbol: '✓', ariaLabel: 'Verdict: REAL — Likely genuine' },
        FAKE:       { bg: '#b91c1c', label: 'FAKE',       symbol: '✗', ariaLabel: 'Verdict: FAKE — Likely misinformation' },
        UNVERIFIED: { bg: '#b45309', label: 'UNVERIFIED', symbol: '?', ariaLabel: 'Verdict: UNVERIFIED — Cannot be confirmed' },
      };
      const cfg = map[verdict] || map['UNVERIFIED'];
      pill.style.backgroundColor = cfg.bg;
      pill.setAttribute('aria-label', cfg.ariaLabel);
      icon.textContent = cfg.symbol;
      text.textContent = cfg.label;
      return cfg.bg;
    }

    /** Populate a bullet list element from an array. */
    function populateList(listEl, items) {
      listEl.innerHTML = '';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        listEl.appendChild(li);
      });
    }

    /** Main submit handler. */
    async function handleAnalyse() {
      clearError();
      resultCard.classList.add('hidden');

      const body = {};
      const text = textArea.value.trim();
      const url  = urlInput.value.trim();
      if (text)         body.text = text;
      if (url)          body.url  = url;
      if (imageBase64)  body.image_base64 = imageBase64;

      if (!Object.keys(body).length) {
        showError('Please provide at least one input — a claim, URL, or screenshot.');
        return;
      }

      setLoading(true);
      // Update aria-live region so screen readers announce loading state
      resultCard.setAttribute('aria-label', 'Analysing…');
      resultCard.classList.remove('hidden');
      resultCard.querySelector('section').innerHTML = '<p class="text-center text-gray-400 py-8">Analysing with Gemini…</p>';

      try {
        const res = await fetch('/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (res.status === 422) {
          const data = await res.json();
          const detail = data?.detail ?? 'Please provide at least one valid input.';
          showError(Array.isArray(detail)
            ? detail.map(e => e.msg).join(' ')
            : detail);
          resultCard.classList.add('hidden');
          return;
        }
        if (!res.ok) {
          showError('Analysis failed. Please try again.');
          resultCard.classList.add('hidden');
          return;
        }

        const data = await res.json();
        renderResult(data);

      } catch (err) {
        showError('Network error. Please check your connection and try again.');
        resultCard.classList.add('hidden');
      } finally {
        setLoading(false);
      }
    }

    /** Render the result card from a VerifyResponse object. */
    function renderResult(data) {
      // Replace placeholder with real result markup
      const section = resultCard.querySelector('section');
      section.innerHTML = document.getElementById('result-template').innerHTML;

      const verdictBg = renderVerdict(data.verdict);

      // Confidence bar
      const pct = Math.round((data.confidence || 0) * 100);
      const bar = section.querySelector('#confidence-bar');
      const fill = section.querySelector('#confidence-fill');
      bar.setAttribute('aria-valuenow', pct);
      fill.style.width = pct + '%';
      fill.style.backgroundColor = verdictBg;
      section.querySelector('#confidence-label').textContent = `${pct}% confident`;

      // Summary
      section.querySelector('#summary-text').textContent = data.summary || '';

      // Red flags
      if (data.red_flags && data.red_flags.length) {
        const box = section.querySelector('#red-flags-box');
        box.classList.remove('hidden');
        populateList(section.querySelector('#red-flags-list'), data.red_flags);
      }

      // Evidence
      if (data.supporting_evidence && data.supporting_evidence.length) {
        const box = section.querySelector('#evidence-box');
        box.classList.remove('hidden');
        populateList(section.querySelector('#evidence-list'), data.supporting_evidence);
      }

      // Search queries
      const queriesDiv = section.querySelector('#queries-section');
      if (data.searched_queries && data.searched_queries.length) {
        queriesDiv.classList.remove('hidden');
        data.searched_queries.forEach(q => {
          const pill = document.createElement('span');
          pill.className = 'bg-gray-700 text-gray-300 text-xs px-2 py-1 rounded-full';
          pill.textContent = q;
          queriesDiv.appendChild(pill);
        });
      }

      // Sources
      const sourcesList = section.querySelector('#sources-list');
      (data.sources || []).forEach(src => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = src;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = src;
        a.className = 'text-blue-400 hover:text-blue-300 text-xs break-all underline';
        li.appendChild(a);
        sourcesList.appendChild(li);
      });

      // Disclaimer
      section.querySelector('#disclaimer-text').textContent = data.disclaimer || '';

      resultCard.setAttribute('aria-label', 'Fact check result');
    }

    // Keyboard: allow Enter on the file label to open file picker
    document.querySelector('label[for="image-upload"]').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });
    document.querySelector('label[for="image-upload"]').setAttribute('tabindex', '0');
    document.querySelector('label[for="image-upload"]').setAttribute('role', 'button');
  </script>

  <!-- Hidden template for result card HTML (cloned on render) -->
  <template id="result-template">
    <div class="flex justify-center mb-4">
      <div id="verdict-pill" class="inline-flex items-center gap-2 px-6 py-2 rounded-full text-white text-xl font-bold" role="status" aria-label="Verdict">
        <span id="verdict-icon" aria-hidden="true"></span>
        <span id="verdict-text"></span>
      </div>
    </div>
    <div class="mb-1">
      <div id="confidence-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Confidence level" class="w-full h-1.5 rounded-full overflow-hidden bg-gray-700">
        <div id="confidence-fill" class="h-full rounded-full transition-all duration-500"></div>
      </div>
    </div>
    <p id="confidence-label" class="text-xs text-gray-400 text-center mb-4"></p>
    <p id="summary-text" class="text-base text-gray-200 text-center max-w-[600px] mx-auto leading-relaxed mb-6"></p>
    <div class="space-y-3 mb-6">
      <div id="red-flags-box" class="hidden bg-red-950/60 border border-red-800 rounded-xl p-4">
        <h2 class="text-sm font-semibold text-red-400 mb-2 flex items-center gap-1"><span aria-hidden="true">🚩</span> Red Flags</h2>
        <ul id="red-flags-list" class="list-disc list-inside text-sm text-red-300 space-y-1"></ul>
      </div>
      <div id="evidence-box" class="hidden bg-green-950/60 border border-green-800 rounded-xl p-4">
        <h2 class="text-sm font-semibold text-green-400 mb-2 flex items-center gap-1"><span aria-hidden="true">✅</span> Supporting Evidence</h2>
        <ul id="evidence-list" class="list-disc list-inside text-sm text-green-300 space-y-1"></ul>
      </div>
    </div>
    <details class="mb-4">
      <summary class="cursor-pointer text-sm font-medium text-gray-400 hover:text-gray-200 transition list-none flex items-center gap-1">
        <span aria-hidden="true">🔎</span> Sources searched <span class="ml-auto text-xs">(click to expand)</span>
      </summary>
      <div class="mt-3 space-y-2">
        <div id="queries-section" class="hidden flex flex-wrap gap-2"></div>
        <ul id="sources-list" class="space-y-1"></ul>
      </div>
    </details>
    <p id="disclaimer-text" class="text-xs text-gray-500 italic text-center"></p>
  </template>
</body>
</html>
