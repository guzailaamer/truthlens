<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TruthLens — Fact Check</title>
  <meta name="description" content="AI-powered fake news detector for WhatsApp forwards, viral news, and Instagram screenshots. Powered by Google Gemini." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    :focus-visible { outline: 3px solid #2563eb; outline-offset: 2px; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeInUp 0.35s ease both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }
    @keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulse-bar { animation: pulse-bar 1.2s ease-in-out infinite; }

    /* Make details/summary work correctly across browsers */
    details > summary { list-style: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .chevron { transform: rotate(180deg); }
    .chevron { transition: transform 0.2s ease; display: inline-block; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans flex flex-col items-center px-4 py-10">

  <!-- HEADER -->
  <header class="text-center mb-8 max-w-xl w-full">
    <div class="flex items-center justify-center gap-3 mb-2">
      <span class="text-4xl" aria-hidden="true">🔍</span>
      <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-violet-400 to-purple-400 bg-clip-text text-transparent">
        TruthLens
      </h1>
    </div>
    <p class="text-lg font-semibold text-gray-200">Fact-check anything in seconds</p>
    <p class="text-sm text-gray-500 mt-1">WhatsApp forwards · Viral news · Instagram screenshots</p>
  </header>

  <main class="w-full max-w-xl space-y-5">

    <!-- INPUT CARD -->
    <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl" aria-label="Fact check input">

      <!-- Text -->
      <div class="mb-4">
        <label for="claim-text" class="block text-sm font-medium text-gray-300 mb-1.5">
          Claim or WhatsApp forward
        </label>
        <textarea
          id="claim-text"
          rows="4"
          maxlength="5000"
          placeholder="Paste a claim, WhatsApp forward, or headline..."
          aria-label="Paste a claim, WhatsApp forward, or headline"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-600 focus:border-blue-500 focus:bg-gray-750 resize-none transition-colors"
        ></textarea>
      </div>

      <!-- URL -->
      <div class="mb-4">
        <label for="article-url" class="block text-sm font-medium text-gray-300 mb-1.5">
          News article URL <span class="text-gray-500 font-normal">(optional)</span>
        </label>
        <input
          id="article-url"
          type="url"
          maxlength="2048"
          placeholder="https://example.com/news-article"
          aria-label="Paste a news article URL"
          class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-100 placeholder-gray-600 focus:border-blue-500 transition-colors"
        />
      </div>

      <!-- Image upload -->
      <div class="mb-5">
        <label for="image-upload" class="block text-sm font-medium text-gray-300 mb-1.5">
          Screenshot <span class="text-gray-500 font-normal">(WhatsApp, Instagram, tweet)</span>
        </label>
        <label
          for="image-upload"
          id="drop-zone"
          tabindex="0"
          role="button"
          aria-label="Upload a screenshot image"
          class="flex flex-col items-center justify-center w-full h-20 border-2 border-dashed border-gray-700 rounded-xl cursor-pointer hover:border-blue-500 hover:bg-gray-800/50 transition-all bg-gray-800/30"
        >
          <span id="file-label" class="text-sm text-gray-500 select-none">
            📎 Click to upload or drag &amp; drop
          </span>
        </label>
        <input id="image-upload" type="file" accept="image/*" class="sr-only" aria-label="Upload screenshot image" />
      </div>

      <!-- Button -->
      <button
        id="analyse-btn"
        type="button"
        disabled
        aria-disabled="true"
        aria-busy="false"
        onclick="handleAnalyse()"
        class="w-full flex items-center justify-center gap-2 py-3 px-6 rounded-xl font-semibold text-white bg-blue-600 hover:bg-blue-500 disabled:opacity-35 disabled:cursor-not-allowed transition-all focus-visible:ring-2 focus-visible:ring-blue-400"
      >
        <span id="btn-icon" aria-hidden="true">✦</span>
        <span id="btn-text">Analyse</span>
      </button>

      <!-- Error -->
      <div
        id="error-alert"
        role="alert"
        aria-live="assertive"
        tabindex="-1"
        class="hidden mt-4 bg-red-950/60 border border-red-800 text-red-300 text-sm rounded-xl px-4 py-3"
      ></div>
    </section>

    <!-- RESULT CARD — always in DOM, revealed after analysis -->
    <!-- aria-live polite: screen reader announces new results automatically -->
    <section
      id="result-card"
      aria-live="polite"
      aria-atomic="true"
      aria-label="Fact check result"
      class="hidden bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl fade-in"
    >
      <!-- Loading state (shown while fetching) -->
      <div id="result-loading" class="hidden flex flex-col items-center py-8 gap-3">
        <svg class="spinner w-8 h-8 text-blue-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10" stroke-opacity="0.2"/>
          <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
        </svg>
        <p class="text-sm text-gray-400">Analysing with Gemini…</p>
      </div>

      <!-- Result content (shown after fetch) -->
      <div id="result-content" class="hidden">

        <!-- Verdict pill: icon + text + colour (never colour alone) -->
        <div class="flex justify-center mb-5">
          <div
            id="verdict-pill"
            role="status"
            class="inline-flex items-center gap-2.5 px-7 py-2.5 rounded-full text-white text-2xl font-extrabold shadow-lg"
          >
            <span id="verdict-icon" aria-hidden="true"></span>
            <span id="verdict-text"></span>
          </div>
        </div>

        <!-- Confidence bar -->
        <div class="mb-1">
          <div
            id="confidence-bar"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="Confidence level"
            class="w-full h-1.5 rounded-full bg-gray-800 overflow-hidden"
          >
            <div id="confidence-fill" class="h-full rounded-full transition-all duration-700 ease-out" style="width:0%"></div>
          </div>
        </div>
        <p id="confidence-label" class="text-xs text-gray-500 text-center mb-5"></p>

        <!-- Summary -->
        <p id="summary-text" class="text-[15px] text-gray-200 text-center leading-relaxed mb-6 max-w-lg mx-auto"></p>

        <!-- Red flags -->
        <div id="red-flags-box" class="hidden bg-red-950/50 border border-red-900/60 rounded-xl p-4 mb-3">
          <h2 class="text-sm font-semibold text-red-400 mb-2 flex items-center gap-1.5">
            <span aria-hidden="true">🚩</span> Red Flags
          </h2>
          <ul id="red-flags-list" class="list-disc list-inside text-sm text-red-300 space-y-1"></ul>
        </div>

        <!-- Supporting evidence -->
        <div id="evidence-box" class="hidden bg-green-950/50 border border-green-900/60 rounded-xl p-4 mb-5">
          <h2 class="text-sm font-semibold text-green-400 mb-2 flex items-center gap-1.5">
            <span aria-hidden="true">✅</span> Supporting Evidence
          </h2>
          <ul id="evidence-list" class="list-disc list-inside text-sm text-green-300 space-y-1"></ul>
        </div>

        <!-- Sources searched — collapsible details/summary -->
        <details id="sources-details" class="mb-5 group">
          <summary class="cursor-pointer select-none flex items-center gap-2 text-sm font-medium text-gray-400 hover:text-gray-200 transition-colors py-2 px-3 rounded-lg hover:bg-gray-800">
            <span aria-hidden="true">🔎</span>
            <span>Sources &amp; search queries</span>
            <svg class="chevron ml-auto w-4 h-4 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </summary>
          <div class="mt-3 pl-2 space-y-3">
            <div id="queries-section" class="hidden flex-wrap gap-1.5"></div>
            <ul id="sources-list" class="space-y-1.5"></ul>
            <p id="no-sources-msg" class="hidden text-xs text-gray-600 italic">No external sources were searched for this analysis.</p>
          </div>
        </details>

        <!-- Disclaimer -->
        <p id="disclaimer-text" class="text-xs text-gray-600 italic text-center border-t border-gray-800 pt-4"></p>
      </div>
    </section>

  </main>

  <!-- JAVASCRIPT -->
  <script>
    'use strict';

    const textArea   = document.getElementById('claim-text');
    const urlInput   = document.getElementById('article-url');
    const fileInput  = document.getElementById('image-upload');
    const fileLabel  = document.getElementById('file-label');
    const dropZone   = document.getElementById('drop-zone');
    const analyseBtn = document.getElementById('analyse-btn');
    const btnText    = document.getElementById('btn-text');
    const btnIcon    = document.getElementById('btn-icon');
    const errorAlert = document.getElementById('error-alert');

    const resultCard    = document.getElementById('result-card');
    const resultLoading = document.getElementById('result-loading');
    const resultContent = document.getElementById('result-content');

    let imageBase64 = null;

    // ── Input state ──────────────────────────────────────────────
    function hasInput() {
      return !!(textArea.value.trim() || urlInput.value.trim() || imageBase64);
    }

    function updateButton() {
      const ok = hasInput();
      analyseBtn.disabled = !ok;
      analyseBtn.setAttribute('aria-disabled', String(!ok));
    }

    textArea.addEventListener('input', updateButton);
    urlInput.addEventListener('input', updateButton);

    // ── File upload ───────────────────────────────────────────────
    fileInput.addEventListener('change', handleFileSelect);
    dropZone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
    });

    function handleFileSelect() {
      const file = fileInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        imageBase64 = e.target.result.split(',')[1];
        fileLabel.textContent = '✓ ' + file.name;
        dropZone.classList.add('border-blue-500', 'bg-blue-950/20');
        dropZone.classList.remove('border-gray-700');
        updateButton();
      };
      reader.readAsDataURL(file);
    }

    // ── Error display ─────────────────────────────────────────────
    function showError(msg) {
      errorAlert.textContent = msg;
      errorAlert.classList.remove('hidden');
    }
    function clearError() {
      errorAlert.textContent = '';
      errorAlert.classList.add('hidden');
    }

    // ── Loading state ─────────────────────────────────────────────
    function setLoading(loading) {
      analyseBtn.setAttribute('aria-busy', String(loading));
      analyseBtn.disabled = loading;

      if (loading) {
        btnIcon.innerHTML = '<svg class="spinner w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10" stroke-opacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/></svg>';
        btnText.textContent = 'Analysing…';
        // Show result card in loading state
        resultCard.classList.remove('hidden');
        resultLoading.classList.remove('hidden');
        resultLoading.classList.add('flex');
        resultContent.classList.add('hidden');
      } else {
        btnIcon.textContent = '✦';
        btnText.textContent = 'Analyse';
        resultLoading.classList.add('hidden');
        resultLoading.classList.remove('flex');
        updateButton();
      }
    }

    // ── Verdict colours ───────────────────────────────────────────
    const VERDICT_CONFIG = {
      REAL:       { bg: '#15803d', symbol: '✓', label: 'REAL',       ariaLabel: 'Verdict: REAL — Likely genuine' },
      FAKE:       { bg: '#b91c1c', symbol: '✗', label: 'FAKE',       ariaLabel: 'Verdict: FAKE — Likely misinformation' },
      UNVERIFIED: { bg: '#b45309', symbol: '?', label: 'UNVERIFIED', ariaLabel: 'Verdict: UNVERIFIED — Cannot be confirmed' },
    };

    // ── Bullet list helper ────────────────────────────────────────
    function fillList(listEl, items) {
      listEl.innerHTML = '';
      (items || []).forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        listEl.appendChild(li);
      });
    }

    // ── Main submit ───────────────────────────────────────────────
    async function handleAnalyse() {
      clearError();

      const body = {};
      if (textArea.value.trim())  body.text = textArea.value.trim();
      if (urlInput.value.trim())  body.url  = urlInput.value.trim();
      if (imageBase64)            body.image_base64 = imageBase64;

      if (!Object.keys(body).length) {
        showError('Please provide at least one input — a claim, URL, or screenshot.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (res.status === 422) {
          const data = await res.json().catch(() => ({}));
          const raw = data?.detail ?? 'Please provide a valid input.';
          showError(Array.isArray(raw) ? raw.map(e => e.msg).join(' ') : raw);
          resultCard.classList.add('hidden');
          return;
        }
        if (!res.ok) {
          showError('Analysis failed. Please try again in a moment.');
          resultCard.classList.add('hidden');
          return;
        }

        renderResult(await res.json());

      } catch (_err) {
        showError('Network error. Check your connection and try again.');
        resultCard.classList.add('hidden');
      } finally {
        setLoading(false);
      }
    }

    // ── Render result ─────────────────────────────────────────────
    function renderResult(data) {
      const cfg = VERDICT_CONFIG[data.verdict] || VERDICT_CONFIG.UNVERIFIED;

      // Verdict pill
      const pill = document.getElementById('verdict-pill');
      pill.style.backgroundColor = cfg.bg;
      pill.setAttribute('aria-label', cfg.ariaLabel);
      document.getElementById('verdict-icon').textContent = cfg.symbol;
      document.getElementById('verdict-text').textContent = cfg.label;

      // Confidence bar
      const pct = Math.round((data.confidence || 0) * 100);
      const bar  = document.getElementById('confidence-bar');
      bar.setAttribute('aria-valuenow', pct);
      const fill = document.getElementById('confidence-fill');
      fill.style.width = '0%';
      fill.style.backgroundColor = cfg.bg;
      // Animate after a tick so CSS transition fires
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.width = pct + '%';
      }));
      document.getElementById('confidence-label').textContent = pct + '% confident';

      // Summary
      document.getElementById('summary-text').textContent = data.summary || '';

      // Red flags
      const rfBox = document.getElementById('red-flags-box');
      if (data.red_flags && data.red_flags.length) {
        rfBox.classList.remove('hidden');
        fillList(document.getElementById('red-flags-list'), data.red_flags);
      } else {
        rfBox.classList.add('hidden');
      }

      // Evidence
      const evBox = document.getElementById('evidence-box');
      if (data.supporting_evidence && data.supporting_evidence.length) {
        evBox.classList.remove('hidden');
        fillList(document.getElementById('evidence-list'), data.supporting_evidence);
      } else {
        evBox.classList.add('hidden');
      }

      // Queries
      const qDiv = document.getElementById('queries-section');
      qDiv.innerHTML = '';
      if (data.searched_queries && data.searched_queries.length) {
        qDiv.classList.remove('hidden');
        qDiv.classList.add('flex');
        data.searched_queries.forEach(q => {
          const pill = document.createElement('span');
          pill.className = 'bg-gray-800 border border-gray-700 text-gray-400 text-xs px-2.5 py-1 rounded-full';
          pill.textContent = q;
          qDiv.appendChild(pill);
        });
      } else {
        qDiv.classList.add('hidden');
        qDiv.classList.remove('flex');
      }

      // Sources
      const srcList = document.getElementById('sources-list');
      srcList.innerHTML = '';
      if (data.sources && data.sources.length) {
        data.sources.forEach(src => {
          const li = document.createElement('li');
          const a  = document.createElement('a');
          a.href            = src;
          a.target          = '_blank';
          a.rel             = 'noopener noreferrer';
          a.textContent     = src;
          a.className       = 'text-blue-400 hover:text-blue-300 text-xs break-all underline underline-offset-2';
          li.appendChild(a);
          srcList.appendChild(li);
        });
      }

      // No sources fallback
      const noSrc = document.getElementById('no-sources-msg');
      const hasSources = (data.sources?.length || 0) + (data.searched_queries?.length || 0) > 0;
      noSrc.classList.toggle('hidden', hasSources);

      // Open the sources details section so user notices it
      if (hasSources) {
        document.getElementById('sources-details').open = true;
      }

      // Disclaimer
      document.getElementById('disclaimer-text').textContent = data.disclaimer || '';

      // Show result content
      resultContent.classList.remove('hidden');
      resultCard.classList.remove('hidden');
    }
  </script>
</body>
</html>
